<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variant Sudoku Puzzles</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background-color: #f5f5f5;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

.sudoku-card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
}

a {
    text-decoration: none;
    color: black;
    transition: color 0.2s ease;
}

a:hover {
    color: #3498db;
}

.sudoku-card img {
    width: 100%;
    border-radius: 5px;
    transition: transform 0.2s ease;
}

.sudoku-card img:hover {
    transform: scale(1.03);
}

.sudoku-title {
    font-size: 1.2em;
    font-weight: bold;
    margin-bottom: 10px;
}

.rule {
    margin-top: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-weight: bold;
}

.rule:hover {
    color: #3498db;
}

.arrow {
    display: inline-block;
    transition: transform 0.3s ease;
}

.arrow.open {
    transform: rotate(90deg);
}

.rule-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
    font-size: 0.9em;
    color: #555;
    margin-top: 5px;
}

.rule-content.open {
    max-height: 100px;
    opacity: 1;
}

/* Responsive */
@media (max-width: 1000px) {
    .grid-container {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .grid-container {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

/* ---------------- RENDER FUNCTION ---------------- */
const grid = document.getElementById("grid");

PUZZLES.forEach(puzzle => {
    const card = document.createElement("div");
    card.className = "sudoku-card";

    let rulesHTML = "";

    puzzle.rules.forEach(ruleKey => {
        const rule = RULES[ruleKey];

        rulesHTML += `
            <div class="rule" onclick="toggleRule(this)">
                <span class="arrow">></span>
                ${rule.name}
            </div>
            <div class="rule-content">
                ${rule.description}
            </div>
        `;
    });

    card.innerHTML = `
        <a href="${puzzle.link}" target="_blank">
            <div class="sudoku-title">${puzzle.title}</div>
            <img src="${puzzle.image}" alt="${puzzle.title}">
        </a>
        ${rulesHTML}
    `;

    grid.appendChild(card);
});

/* ---------------- INTERACTION ---------------- */
function toggleRule(element) {
    const arrow = element.querySelector(".arrow");
    const content = element.nextElementSibling;

    arrow.classList.toggle("open");
    content.classList.toggle("open");
}
